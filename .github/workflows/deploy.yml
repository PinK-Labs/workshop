name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Supabase config
        env:
          _SUPABASE_URL: ${{ secrets['_SUPABASE_URL'] }}
          _SUPABASE_KEY: ${{ secrets['_SUPABASE_KEY'] }}
        run: |
          if [ -z "$_SUPABASE_URL" ] || [ -z "$_SUPABASE_KEY" ]; then
            echo "Missing GitHub environment secrets: _SUPABASE_URL and/or _SUPABASE_KEY" >&2
            exit 1
          fi

          node <<'NODE'
          const fs = require('fs');

          fs.writeFileSync(
            'supabase-config.js',
            [
              `window._SUPABASE_URL = ${JSON.stringify(process.env._SUPABASE_URL)};`,
              `window._SUPABASE_KEY = ${JSON.stringify(process.env._SUPABASE_KEY)};`,
              '',
            ].join('\n')
          );
          NODE

          echo "Generated supabase-config.js ($(wc -c < supabase-config.js) bytes)"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
